<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支持我们 · 捐赠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e2e8f0;
        }
        .donate-container {
            max-width: 1100px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .pay-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .pay-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.2s;
        }
        .pay-card:hover {
            transform: translateY(-5px);
        }
        .pay-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .pay-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .pay-desc {
            color: #cbd5e1;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .qr-container {
            background: white;
            border-radius: 20px;
            padding: 15px;
            display: inline-block;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .qr-container img {
            width: 180px;
            height: 180px;
            display: block;
            border-radius: 10px;
        }
        .qr-placeholder {
            width: 180px;
            height: 180px;
            background: #334155;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .account-info {
            background: #1e293b;
            border-radius: 40px;
            padding: 10px 15px;
            font-size: 1rem;
            color: #fbbf24;
            word-break: break-all;
            border: 1px solid #fbbf24;
            margin-top: 10px;
        }
        .account-info span {
            color: #cbd5e1;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 5px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
        }
        .thankyou {
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 15px 30px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .back-link {
            display: inline-block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.1);
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .qr-container img, .qr-placeholder { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>
    <div class="donate-container">
        <h1>💖 支持我们 💖</h1>
        <p class="subtitle">我们无偿为别人提供技术，你可以选择不用捐赠留着钱给自己买好吃的</p>

        <div class="pay-grid">
            <!-- 微信支付 -->
            <div class="pay-card">
                <div class="pay-icon">💚</div>
                <div class="pay-title">微信支付</div>
                <p class="pay-desc">扫一扫，支持我们</p>
                <div class="qr-container">
                    <!-- 替换为你的微信收款码图片 -->
                    <img src="wechat-qr.png" alt="微信收款码" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'qr-placeholder\'>微信收款码<br>谢谢你的好意</div>'">
                </div>
                <!-- 可选：显示微信号 -->
                <!-- <div class="account-info"><span>微信号</span> your_wechat_id</div> -->
            </div>

            <!-- QQ支付 -->
            <div class="pay-card">
                <div class="pay-icon">💙</div>
                <div class="pay-title">QQ支付</div>
                <p class="pay-desc">手机QQ扫一扫</p>
                <div class="qr-container">
                    <!-- 替换为你的QQ收款码图片 -->
                    <img src="qq-qr.png" alt="QQ收款码" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'qr-placeholder\'>QQ收款码<br>但是我们不会收</div>'">
                </div>
                <!-- 可选：显示QQ号 -->
                <!-- <div class="account-info"><span>QQ号</span> 123456789</div> -->
            </div>

            <!-- KBZPay (缅甸KBZ银行) -->
            <div class="pay-card">
                <div class="pay-icon">🏦</div>
                <div class="pay-title">KBZPay</div>
                <p class="pay-desc">缅甸KBZ银行扫码</p>
                <div class="qr-container">
                    <!-- 替换为你的KBZPay收款码图片 -->
                    <img src="kbz-qr.png" alt="KBZPay收款码" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'qr-placeholder\'>KBZPay收款码<br>留着给自己吧</div>'">
                </div>
                <!-- 如果需要显示账号 -->
                <div class="account-info">
                    <span>账号</span>
                    520***1314
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="thankyou">🙏 感谢你的支持！</div>
            <br>
            <a href="https://xg108t-t.github.io/" class="back-link">← 返回主页</a>
        </div>
    </div>

    <!-- 可选：添加返回主页的备用链接（如果上面链接不对可以手动改） -->
</body>
</html>
