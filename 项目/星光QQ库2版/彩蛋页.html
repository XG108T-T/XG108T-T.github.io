<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点击挑战 · 小游戏</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game-box {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            margin: 0 0 10px;
            color: #1e293b;
            font-size: 2rem;
        }
        .timer {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 20px;
        }
        .score {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #7c3aed;
        }
        .click-btn {
            background: #f59e0b;
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            padding: 30px 40px;
            border-radius: 60px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
            margin-bottom: 20px;
            touch-action: manipulation;
        }
        .click-btn:active {
            transform: scale(0.95);
        }
        .click-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .restart-btn {
            background: #10b981;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            margin-top: 10px;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>⚡ 点击速度挑战</h1>
        <div class="timer" id="timer">5s</div>
        <div class="score" id="scoreDisplay">0 次</div>
        <button class="click-btn" id="clickBtn" disabled>点我！</button>
        <button class="restart-btn" id="restartBtn">重新开始</button>
        <a href="javascript:history.back()" class="back-link">← 返回主页</a>
    </div>

    <script>
        (function() {
            const clickBtn = document.getElementById('clickBtn');
            const restartBtn = document.getElementById('restartBtn');
            const timerSpan = document.getElementById('timer');
            const scoreSpan = document.getElementById('scoreDisplay');

            let timeLeft = 5;
            let score = 0;
            let timerInterval = null;
            let gameActive = false;

            function updateDisplay() {
                timerSpan.textContent = timeLeft + 's';
                scoreSpan.textContent = score + ' 次';
            }

            function endGame() {
                gameActive = false;
                clickBtn.disabled = true;
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = null;
            }

            function startGame() {
                // 重置
                timeLeft = 5;
                score = 0;
                updateDisplay();
                gameActive = true;
                clickBtn.disabled = false;

                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerSpan.textContent = timeLeft + 's';
                    if (timeLeft <= 0) {
                        endGame();
                    }
                }, 1000);
            }

            clickBtn.addEventListener('click', function() {
                if (!gameActive) return;
                score++;
                scoreSpan.textContent = score + ' 次';
            });

            restartBtn.addEventListener('click', function() {
                startGame();
            });

            // 页面加载后自动开始（可选）
            startGame();
        })();
    </script>
</body>
</html>
