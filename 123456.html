<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>虚拟商店 · 星光汇影</title>
    <style>
        /* 基础重置 + 主题变量 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #faf9f8;
            color: #1a1a1a;
            transition: background 0.3s, color 0.3s;
            line-height: 1.5;
        }
        body.dark {
            background: #0a0c10;
            color: #eef2ff;
        }
        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 100;
            color: white;
            font-weight: 500;
        }
        body.dark .theme-toggle {
            background: rgba(255,255,255,0.2);
            color: #facc15;
        }
        /* 头部导航 */
        .top-bar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .logo a {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .back-home a {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        body.dark .back-home a {
            color: #9ca3af;
        }
        .back-home a:hover {
            color: #2563eb;
        }
        /* 商品网格 */
        .shop-grid {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }
        .product-card {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        body.dark .product-card {
            background: #1e1f2c;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
        }
        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            background: #e5e7eb;
        }
        body.dark .product-image {
            background: #2d2f3e;
        }
        .product-info {
            padding: 1.5rem;
        }
        .product-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .product-badge {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            background: #e0e7ff;
            color: #1e40af;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
        }
        body.dark .product-badge {
            background: #2d3a5e;
            color: #a5f3fc;
        }
        .product-price {
            margin-top: 0.75rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: #2563eb;
        }
        /* 底部 */
        .footer {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
            font-size: 0.8rem;
        }
        @media (max-width: 640px) {
            .shop-grid { gap: 1.5rem; padding: 0 1rem; }
            .product-info { padding: 1rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙 深色</button>

    <div class="top-bar">
        <div class="logo"><a href="shop.html">✨ 星光商店</a></div>
        <div class="back-home"><a href="index.html">← 返回主页</a></div>
    </div>

    <div class="shop-grid">
        <!-- 商品1:莫本猫猫模型 -->
        <a href="1231.html" class="product-card">
            <img class="product-image" src="MB1.webp" alt="莫本猫猫模型预览">
            <div class="product-info">
                <div class="product-title">🐱 莫本猫猫</div>
                <div class="product-badge">🔥 在售已降价 · 闲鱼可购</div>
                <div class="product-price">¥44-58</div>
            </div>
        </a>

        <!-- 商品2：豆狗模型 -->
        <a href="1232.html" class="product-card">
            <img class="product-image" src="111.webp" alt="豆狗模型预览">
            <div class="product-info">
                <div class="product-title">🐶 豆狗（已完成92%）</div>
                <div class="product-badge">⚙️ 努力制作中！</div>
                <div class="product-price">即将公布</div>
            </div>
        </a>

        <!-- 商品3：待定模型 -->
        <a href="666.html" class="product-card">
            <img class="product-image" src="LL1.webp" alt="待定">
            <div class="product-info">
                <div class="product-title">待定…</div>
                <div class="product-badge">🪢 未制作</div>
                <div class="product-price">公布待定</div>
            </div>
        </a>
    </div>
    
    <div class="footer">
        🌟 所有模型均为星光制作 | 闲鱼只有叫“砂糖橘ww”售卖<br>
        ⚠️注意任何别人的地方均为盗模售卖<br>
        🟢每次模型上线本网站都会同步上线抽奖活动，来给部分运气好的人免费上传模型<br>
        🔴请小心购买了这些通过非法手段获取的模型上传传到你的账号当中<br>
        🔴可能会被官方警告，甚至封号的风险不要贪小便宜<br>
    </div>

    <script>
        // 主题切换（独立于主站）
        const toggle = document.getElementById('themeToggle');
        const stored = localStorage.getItem('shopTheme');
        if (stored === 'dark') {
            document.body.classList.add('dark');
            toggle.innerHTML = '☀️ 浅色';
        }
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('shopTheme', isDark ? 'dark' : 'light');
            toggle.innerHTML = isDark ? '☀️ 浅色' : '🌙 深色';
        });
    </script>
</body>
</html>
