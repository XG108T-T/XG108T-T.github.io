<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>原作者反馈 · 星光商店</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #faf9f8;
            color: #1a1a1a;
            transition: background 0.3s, color 0.3s;
            line-height: 1.5;
        }
        body.dark {
            background: #0a0c10;
            color: #eef2ff;
        }
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 100;
            color: white;
        }
        body.dark .theme-toggle {
            background: rgba(255,255,255,0.2);
            color: #facc15;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        body.dark .top-bar {
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }
        body.dark .nav-links a {
            color: #9ca3af;
        }
        .card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        body.dark .card {
            background: #1e293b;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        select, input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 1.5rem;
            border: 1px solid #cbd5e1;
            background: #f9f9f9;
            font-size: 1rem;
            transition: 0.2s;
        }
        body.dark select, body.dark input, body.dark textarea {
            background: #0f172a;
            border-color: #334155;
            color: white;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
        }
        .image-upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        body.dark .image-upload-area {
            border-color: #334155;
        }
        .image-upload-area:hover {
            border-color: #2563eb;
        }
        .image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 1rem;
            margin-top: 0.5rem;
        }
        .upload-status {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            color: #64748b;
        }
        .btn-submit {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: 0.2s;
        }
        .btn-submit:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading-models {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.5rem;
        }
        @media (max-width: 640px) {
            .container { padding: 1rem; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙 深色</button>
    <div class="container">
        <div class="top-bar">
            <div class="nav-links">
                <a href="123456.html">← 商店首页</a>
                <a href="TG.html">📤 投稿模型</a>
                <a href="submissions.html">📋 投稿列表</a>
            </div>
        </div>

        <div class="card">
            <h1>📢 原作者反馈</h1>
            <div class="sub">如果你是该模型的原创作者，不希望我们复刻或售卖，请填写此表申诉。我们将尽快核实处理。</div>
            <form id="feedbackForm">
                <div class="form-group">
                    <label>选择模型 *</label>
                    <select id="modelSelect">
                        <option value="">-- 从列表中选择模型 --</option>
                        <option value="other">其他（手动输入名称）</option>
                    </select>
                    <div id="modelNameGroup" style="display: none; margin-top: 0.8rem;">
                        <input type="text" id="modelNameInput" placeholder="请输入模型名称">
                    </div>
                    <div id="loadingModels" class="loading-models">加载模型列表中...</div>
                </div>
                <div class="form-group">
                    <label>你的联系方式（QQ/微信） *</label>
                    <input type="text" id="contact" placeholder="用于核实身份及后续联系" required>
                </div>
                <div class="form-group">
                    <label>申诉理由 *</label>
                    <textarea id="reason" rows="4" placeholder="例如：该模型是我原创的付费模型，不希望被复刻或售卖。请附上证明信息（如原链接、截图等）" required></textarea>
                </div>
                <div class="form-group">
                    <label>上传证明图片（可选）</label>
                    <div class="image-upload-area" id="uploadArea">
                        <input type="file" id="imageFile" accept="image/*" style="display: none;">
                        <div id="uploadPrompt">📸 点击选择图片（支持截图、原模型图等）</div>
                        <img id="imagePreview" class="image-preview" style="display: none;">
                        <div id="uploadStatus" class="upload-status"></div>
                    </div>
                    <input type="hidden" id="imageUrl" value="">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">提交反馈</button>
            </form>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        // 使用统一的投稿后端（已包含图片上传和反馈存储功能）
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzP60hkUEkUfHQZ70K33DhFgeuoUZ-ANB9iJaqxnYdd6r2brQpAGpbkTuiziLDILSkW/exec';

        // ========== 主题切换 ==========
        const toggle = document.getElementById('themeToggle');
        const stored = localStorage.getItem('feedbackTheme');
        if (stored === 'dark') {
            document.body.classList.add('dark');
            toggle.innerHTML = '☀️ 浅色';
        }
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('feedbackTheme', isDark ? 'dark' : 'light');
            toggle.innerHTML = isDark ? '☀️ 浅色' : '🌙 深色';
        });

        // ========== 图片上传（通过后端中转，已添加 headers） ==========
        const fileInput = document.getElementById('imageFile');
        const uploadArea = document.getElementById('uploadArea');
        const imagePreview = document.getElementById('imagePreview');
        const uploadStatus = document.getElementById('uploadStatus');
        const imageUrlInput = document.getElementById('imageUrl');

        uploadArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 预览
            const reader = new FileReader();
            reader.onload = (ev) => {
                imagePreview.src = ev.target.result;
                imagePreview.style.display = 'block';
                document.getElementById('uploadPrompt').style.display = 'none';
            };
            reader.readAsDataURL(file);

            // 转为 base64 并发送到后端
            const base64Reader = new FileReader();
            base64Reader.onload = async (ev) => {
                const base64Data = ev.target.result.split(',')[1];
                uploadStatus.textContent = '上传中...';
                uploadStatus.style.color = '#facc15';
                try {
                    const response = await fetch(BACKEND_URL + '?action=upload', {
                        method: 'POST',
                        mode: 'cors',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ image: base64Data })
                    });
                    const result = await response.json();
                    if (result.success) {
                        imageUrlInput.value = result.url;
                        uploadStatus.textContent = '✅ 图片已上传';
                        uploadStatus.style.color = '#10b981';
                    } else {
                        throw new Error(result.error || '上传失败');
                    }
                } catch (err) {
                    uploadStatus.textContent = '❌ 上传失败，可稍后重试';
                    uploadStatus.style.color = '#ef4444';
                    imageUrlInput.value = '';
                }
            };
            base64Reader.readAsDataURL(file);
        });

        // ========== 加载模型列表（通过后端） ==========
        const modelSelect = document.getElementById('modelSelect');
        const modelNameGroup = document.getElementById('modelNameGroup');
        const modelNameInput = document.getElementById('modelNameInput');
        const loadingDiv = document.getElementById('loadingModels');

        async function loadModelList() {
            try {
                const response = await fetch(BACKEND_URL + '?action=list');
                const data = await response.json();
                if (data.submissions && data.submissions.length > 0) {
                    const modelMap = new Map();
                    data.submissions.forEach(item => {
                        const name = item['模型名称'];
                        const time = item['时间'];
                        if (!modelMap.has(name) || new Date(time) > new Date(modelMap.get(name))) {
                            modelMap.set(name, time);
                        }
                    });
                    const modelNames = Array.from(modelMap.entries())
                        .sort((a,b) => new Date(b[1]) - new Date(a[1]))
                        .map(entry => entry[0]);
                    while (modelSelect.options.length > 2) modelSelect.remove(2);
                    modelNames.forEach(name => {
                        const option = document.createElement('option');
                        option.value = name;
                        option.textContent = name;
                        modelSelect.appendChild(option);
                    });
                    loadingDiv.textContent = `✅ 已加载 ${modelNames.length} 个模型`;
                } else {
                    loadingDiv.textContent = '暂无投稿模型，可手动输入';
                }
            } catch (err) {
                console.error(err);
                loadingDiv.textContent = '⚠️ 加载模型列表失败，请手动输入';
            }
        }

        modelSelect.addEventListener('change', () => {
            if (modelSelect.value === 'other') {
                modelNameGroup.style.display = 'block';
                modelNameInput.required = true;
            } else {
                modelNameGroup.style.display = 'none';
                modelNameInput.required = false;
                modelNameInput.value = '';
            }
        });

        // ========== 反馈提交（已添加 headers） ==========
        const form = document.getElementById('feedbackForm');
        const submitBtn = document.getElementById('submitBtn');
        form.onsubmit = async (e) => {
            e.preventDefault();
            let modelName = modelSelect.value;
            if (modelName === 'other') {
                modelName = modelNameInput.value.trim();
                if (!modelName) {
                    alert('请输入模型名称');
                    return;
                }
            } else if (!modelName) {
                alert('请选择或输入模型名称');
                return;
            }
            const contact = document.getElementById('contact').value.trim();
            const reason = document.getElementById('reason').value.trim();
            const imageUrl = imageUrlInput.value.trim();
            if (!contact || !reason) {
                alert('请填写联系方式和申诉理由');
                return;
            }
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            try {
                const response = await fetch(BACKEND_URL + '?action=feedback', {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ modelName, contact, reason, imageUrl })
                });
                const result = await response.json();
                if (result.success) {
                    alert('反馈已提交，我们会尽快处理并联系您。');
                    form.reset();
                    modelSelect.value = '';
                    modelNameGroup.style.display = 'none';
                    imagePreview.style.display = 'none';
                    document.getElementById('uploadPrompt').style.display = 'block';
                    uploadStatus.textContent = '';
                    imageUrlInput.value = '';
                } else {
                    alert('提交失败，请稍后重试');
                }
            } catch (err) {
                console.error(err);
                alert('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交反馈';
            }
        };

        // 加载模型列表
        loadModelList();

        // 如果后端 URL 未配置（占位符），提示用户
        if (BACKEND_URL === 'YOUR_UNIFIED_APPS_SCRIPT_URL') {
            alert('请先配置统一的 BACKEND_URL（在代码中修改）');
        }
    </script>
</body>
</html>
