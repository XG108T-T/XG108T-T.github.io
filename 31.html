<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>加入QQ群</title>
<!-- 如果软件无法加载外部图标库，就使用本地 Unicode 符号代替 -->
</head>
<body style="margin:0; background:linear-gradient(#667eea,#764ba2); font-family:sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
<div style="background:white; max-width:400px; width:100%; padding:30px 20px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2); text-align:center;">

    <!-- 用本地符号代替图标，避免外部资源加载失败 -->
    <div style="width:80px; height:80px; background:#12B7F5; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; color:white; font-size:40px;">Q</div>

    <h1 style="font-size:28px; color:#1F2937; margin:0 0 8px;">加入QQ群</h1>
    <p style="color:#6B7280; margin-bottom:25px;">与志同道合的朋友一起交流</p>

    <div style="background:#E6F4FF; padding:15px; border-radius:10px; margin-bottom:20px;">
        <div style="font-size:32px; font-weight:bold; color:#12B7F5;">1064117555</div>
        <div style="color:#6B7280; font-size:14px; margin-top:5px;">技术交流群</div>
    </div>

    <!-- 直接显示按钮，不使用伪类动画，简单样式 -->
    <a href="tencent://AddContact/?fromId=45&fromSubId=1&subcmd=all&uin=1064117555" style="display:block; width:100%; padding:14px; border-radius:10px; background:#12B7F5; color:white; text-decoration:none; font-weight:600; margin-bottom:12px; box-sizing:border-box;">📱 立即加入</a>

    <button onclick="copyQQ()" style="display:block; width:100%; padding:14px; border-radius:10px; background:white; color:#12B7F5; border:2px solid #12B7F5; font-weight:600; cursor:pointer; margin-bottom:20px; box-sizing:border-box;">📋 复制群号</button>

    <div style="display:flex; gap:8px; background:#ECFDF3; padding:12px; border-radius:10px; margin-bottom:20px;">
        <input type="text" id="qqInput" value="1064117555" readonly style="flex:1; padding:8px; text-align:center; border:2px solid #10B981; border-radius:6px; background:white; font-weight:bold;">
        <button onclick="copyQQ()" style="padding:8px 16px; background:#10B981; color:white; border:none; border-radius:6px; cursor:pointer;">复制</button>
    </div>

    <div style="font-size:13px; color:#6B7280; background:#FEF9E7; padding:12px; border-radius:8px; text-align:left;">
        💡 温馨提示<br>
        • 点击“立即加入”可直接唤起手机QQ。<br>
        • 若无法打开，请手动复制群号添加。
    </div>

    <!-- 临时提示浮层（用 alert 替代，避免复杂样式） -->
    <div id="toast" style="position:fixed; top:20px; right:20px; background:#10B981; color:white; padding:10px 20px; border-radius:6px; display:none;">✅ 群号已复制</div>

    <script>
        function copyQQ() {
            var qq = '1064117555';
            // 兼容性复制
            var input = document.createElement('textarea');
            input.value = qq;
            document.body.appendChild(input);
            input.select();
            try {
                var success = document.execCommand('copy');
                if (success) {
                    // 显示简单提示
                    var toast = document.getElementById('toast');
                    toast.style.display = 'block';
                    setTimeout(function() {
                        toast.style.display = 'none';
                    }, 2000);
                } else {
                    alert('复制失败，请手动复制');
                }
            } catch (err) {
                alert('复制失败，请手动复制');
            }
            document.body.removeChild(input);
        }
    </script>
</div>
</body>
</html>
