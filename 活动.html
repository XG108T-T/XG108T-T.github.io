<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星光抽奖 · 来试试你的运气吧！</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 16px;
        }
        .lottery-container {
            max-width: 550px;
            width: 100%;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(99,102,241,0.4);
        }
        h1 { text-align: center; font-size: 1.8rem; background: linear-gradient(135deg, #e0e7ff, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub { text-align: center; color: #94a3b8; font-size: 0.8rem; margin-bottom: 24px; border-bottom: 1px dashed #334155; display: inline-block; width: auto; margin-left: auto; margin-right: auto; padding-bottom: 6px; }
        .slot-machine { background: #0b1120; border-radius: 48px; padding: 18px 12px; margin: 10px 0 20px; border: 1px solid #2d3a5e; }
        .track { width: 100%; max-width: 300px; height: 110px; background: #111827; border-radius: 30px; border: 2px solid #4f46e5; overflow: hidden; position: relative; margin: 0 auto; }
        .highlight { position: absolute; width: calc(100% - 20px); height: 80px; top: 15px; left: 10px; border: 3px solid #facc15; border-radius: 24px; pointer-events: none; z-index: 10; box-shadow: 0 0 12px rgba(250,204,21,0.6); }
        .slot-reel { display: flex; flex-direction: column; position: absolute; top: 0; left: 0; width: 100%; transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.1); }
        .item { height: 110px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; background: linear-gradient(145deg, #1e293b, #0f172a); color: #f1f5f9; border-bottom: 1px solid #334155; }
        .prize-first { background: linear-gradient(145deg, #ffd966, #f59e0b) !important; color: #2c1a00 !important; }
        .prize-second { background: linear-gradient(145deg, #cbd5e1, #94a3b8) !important; color: #0f172a !important; }
        .prize-third { background: linear-gradient(145deg, #cd7f32, #b45309) !important; color: #fff2e5 !important; }
        .prize-again { background: linear-gradient(145deg, #2dd4bf, #0d9488) !important; color: #042f2e !important; }
        .prize-none { background: linear-gradient(145deg, #2d3a5e, #1e293b) !important; color: #94a3b8; }
        .spin-btn { display: flex; justify-content: center; margin: 20px 0 15px; }
        button { background: linear-gradient(90deg, #4f46e5, #a855f7); border: none; padding: 14px 42px; border-radius: 60px; font-size: 1.3rem; font-weight: bold; color: white; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .log-section { background: rgba(0,0,0,0.4); border-radius: 36px; padding: 16px; margin-top: 16px; }
        .log-header { font-weight: bold; color: #cbd5e1; margin-bottom: 10px; }
        .log-list { max-height: 180px; overflow-y: auto; }
        .log-item { background: #0f172a; margin-bottom: 8px; padding: 8px 14px; border-radius: 40px; font-size: 0.8rem; display: flex; justify-content: space-between; border-left: 3px solid #4f46e5; color: #e2e8f0; }
        .log-time { font-family: monospace; font-size: 0.7rem; color: #7c8db0; }
        .prize-win { color: #facc15; font-weight: bold; }
        .prize-again-color { color: #2dd4bf; font-weight: bold; }
        .prize-lose { color: #94a3b8; }
        .glow-text { text-align: center; font-size: 0.7rem; color: #6b7280; margin-top: 16px; }
        .modal-mask { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 20000; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .modal-mask.show { opacity: 1; pointer-events: auto; }
        .modal-card { background: rgba(15,25,45,0.96); backdrop-filter: blur(20px); border: 1px solid #818cf8; border-radius: 48px; padding: 28px 24px; max-width: 340px; width: 85%; text-align: center; transform: scale(0.9); transition: transform 0.2s; }
        .modal-mask.show .modal-card { transform: scale(1); }
        .modal-card h3 { font-size: 1.6rem; margin-bottom: 16px; background: linear-gradient(135deg, #facc15, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .modal-card p { color: #cbd5e1; margin: 12px 0; font-size: 0.9rem; }
        .modal-card button { background: linear-gradient(90deg, #4f46e5, #a855f7); border: none; padding: 10px 28px; border-radius: 60px; font-size: 1rem; font-weight: bold; color: white; margin-top: 20px; cursor: pointer; }
        .user-id-input { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .user-id-input input { flex: 1; min-width: 200px; padding: 12px 20px; border-radius: 60px; border: 1px solid #4f46e5; background: rgba(0,0,0,0.5); color: white; font-size: 1rem; outline: none; }
        .user-id-input input::placeholder { color: #94a3b8; }
    </style>
</head>
<!-- 同意弹窗模块：开始 -->
<div id="privacyConsent" style="position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100000; display: flex; align-items: center; justify-content: center;">
    <div style="background: rgba(20,30,45,0.96); border-radius: 48px; padding: 32px 28px; max-width: 340px; width: 85%; text-align: center; border: 1px solid #818cf8; box-shadow: 0 20px 35px rgba(0,0,0,0.3);">
        <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
        <h3 style="color: #facc15; margin-bottom: 16px;">隐私授权</h3>
        <p style="color: #cbd5e1; font-size: 0.9rem; margin-bottom: 24px;">继续抽奖表示您同意我们收集昵称/QQ号/VX号用于兑奖及防止重复抽奖。您的信息仅用于本次活动，不会外泄。</p>
        <button id="consentConfirmBtn" style="background: linear-gradient(90deg, #4f46e5, #a855f7); border: none; padding: 12px 28px; border-radius: 60px; font-size: 1rem; font-weight: bold; color: white; cursor: pointer; width: 100%; transition: 0.2s;">同意并继续</button>
    </div>
</div>
<script>
    (function() {
        var overlay = document.getElementById('privacyConsent');
        var confirmBtn = document.getElementById('consentConfirmBtn');
        if (confirmBtn) {
            confirmBtn.addEventListener('click', function() {
                if (overlay) overlay.style.display = 'none';
                // 启用抽奖按钮和输入框（如果它们存在且有 disabled 属性）
                var spinBtn = document.getElementById('spinButton');
                if (spinBtn) spinBtn.disabled = false;
                var userIdInput = document.getElementById('userId');
                if (userIdInput) userIdInput.disabled = false;
            });
        }
        // 如果没有找到按钮，不报错
    })();
</script>
<!-- 同意弹窗模块：结束 -->
<body>
<div class="lottery-container" id="app">
    <h1>✨ 星光幸运轮盘 ✨</h1>
    <div class="sub">每人仅限一次 · 试试吧说不定就中了呢</div>
    <div class="user-id-input">
        <input type="text" id="userId" placeholder="请输入你的昵称+QQ号/VX号（用于领奖我们会保护您的隐私）" autocomplete="off">
    </div>
    <div class="slot-machine">
        <div class="track">
            <div class="highlight"></div>
            <div class="slot-reel" id="reel">
                <div class="item">🏆 一等奖</div><div class="item">🍃 谢谢参与</div><div class="item">🎁 二等奖</div><div class="item">🍃 谢谢参与</div>
                <div class="item">✨ 三等奖</div><div class="item">🍃 谢谢参与</div><div class="item">🏆 一等奖</div><div class="item">🔄 再来一次</div>
                <div class="item">🎁 二等奖</div><div class="item">🍃 谢谢参与</div><div class="item">✨ 三等奖</div>
            </div>
        </div>
    </div>
    <div class="spin-btn"><button id="spinButton">🔮 抽 奖 🔮</button></div>
    <div class="log-section"><div class="log-header">📜 抽奖记录</div><div class="log-list" id="logList"><div style="color:#475569; text-align:center;">暂无记录</div></div></div>
    <div class="glow-text">🎈 中奖请加微信 <strong>截图</strong> 兑奖</div>
</div>

<script>
    // ==========后段由Google防护==========
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzNGiVtR6r4okMFlwwayYtWVXQxuOfFaO2Y7wSL0P2RxlrXxYsawB_1TnyDOmF51w-9/exec';

    // 转盘动画相关
    const reel = document.getElementById('reel');
    const spinBtn = document.getElementById('spinButton');
    const logDiv = document.getElementById('logList');
    const userIdInput = document.getElementById('userId');
    let spinning = false;

    const PRIZE_INDEX = {
        "一等奖": [0,6],
        "二等奖": [2,8],
        "三等奖": [4,10],
        "再来一次": [7],
        "谢谢参与": [1,3,5,9]
    };
    const THANK_INDICES = [1,3,5,9];

    function addLog(prize, isAgain = false) {
        const time = new Date().toLocaleTimeString();
        let icon = '', cls = '';
        if (prize === '一等奖') { icon='🏆'; cls='prize-win'; }
        else if (prize === '二等奖') { icon='🎁'; cls='prize-win'; }
        else if (prize === '三等奖') { icon='✨'; cls='prize-win'; }
        else if (prize === '再来一次') { icon='🔄'; cls='prize-again-color'; }
        else { icon='🍃'; cls='prize-lose'; }
        const html = `<div class="log-item"><span class="log-time">${time}</span><span class="${cls}">${icon} ${prize}</span></div>`;
        if (isAgain) logDiv.insertAdjacentHTML('beforeend', html);
        else logDiv.innerHTML = html;
    }

    function moveToIndex(idx, duration, callback) {
        const itemHeight = 110, highlightTop = 15;
        const targetY = -(idx * itemHeight - highlightTop);
        reel.style.transition = `transform ${duration}ms cubic-bezier(0.2, 0.9, 0.3, 1.1)`;
        reel.style.transform = `translateY(${targetY}px)`;
        if (callback) setTimeout(callback, duration);
    }

    function resetReel() {
        reel.style.transition = 'none';
        reel.style.transform = 'translateY(0)';
        void reel.offsetHeight;
    }

    async function spin() {
        if (spinning) return;

        const userId = userIdInput.value.trim();
        if (!userId) {
            alert('请先输入你的昵称+QQ号/VX号，以便中奖后联系');
            return;
        }

        spinning = true;
        spinBtn.disabled = true;
        spinBtn.innerText = '🎲 连接服务器...';

        let result;
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({ userId: userId, version: 'v1' })
            });
            result = await response.json();
        } catch (err) {
            alert('网络错误，请稍后重试（抱歉我们使用的是Google服务可能会导致您无法抽奖，中奖后可截图联系我（V：qp1qp12qp2）');
            spinning = false;
            spinBtn.disabled = false;
            spinBtn.innerText = '🔮 抽 奖 🔮';
            return;
        }

        if (result.error) {
            alert(result.error);
            spinning = false;
            spinBtn.disabled = false;
            spinBtn.innerText = '🔮 抽 奖 🔮';
            return;
        }

        const realPrize = result.prize;
        const isAgain = (realPrize === '再来一次');
        const isWin = (realPrize !== '谢谢参与' && realPrize !== '再来一次');
        const indices = PRIZE_INDEX[realPrize];
        const targetIndex = indices[Math.floor(Math.random() * indices.length)];

        spinBtn.innerText = '🎲 命运旋转...';
        resetReel();
        await new Promise(r => setTimeout(r, 30));

        if (isWin || isAgain) {
            const fakeIndex = THANK_INDICES[Math.floor(Math.random() * THANK_INDICES.length)];
            await new Promise(r => moveToIndex(fakeIndex, 700, r));
            await new Promise(r => setTimeout(r, 400));
            await new Promise(r => moveToIndex(targetIndex, 800, r));
            await new Promise(r => setTimeout(r, 200));
        } else {
            await new Promise(r => moveToIndex(targetIndex, 800, r));
            await new Promise(r => setTimeout(r, 200));
        }

        if (isAgain) {
            addLog(realPrize, true);
            alert(`🔄 恭喜抽中【再来一次】！你将额外获得一次抽奖机会，请继续抽奖～`);
            spinBtn.disabled = false;
            spinBtn.innerText = '🔮 再来一次 🔮';
            spinning = false;
            return;
        }

        addLog(realPrize, false);
        spinBtn.disabled = true;
        if (isWin) {
            spinBtn.innerText = '🎉 恭喜中奖 🎉';
            setTimeout(() => alert(`🎉 恭喜抽中 ${realPrize}！\n请添加微信 qp1qp12qp2 兑奖 🎉`), 300);
        } else {
            spinBtn.innerText = '🍀 下次好运 🍀';
        }
        spinning = false;
    }

    // 转盘着色
    document.querySelectorAll('.item').forEach(el => {
        const txt = el.innerText.replace(/[🏆🎁✨🔄🍃]/g, '').trim();
        if (txt === '一等奖') el.classList.add('prize-first');
        else if (txt === '二等奖') el.classList.add('prize-second');
        else if (txt === '三等奖') el.classList.add('prize-third');
        else if (txt === '再来一次') el.classList.add('prize-again');
        else if (txt === '谢谢参与') el.classList.add('prize-none');
    });

    spinBtn.onclick = spin;
</script>
</body>
</html>
